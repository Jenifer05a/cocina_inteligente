<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Inicio - Cocina Inteligente</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial;

            background:#f4f6f9;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .contenedor{

            text-align:center;

        }

        h1{

            font-size:50px;

            margin-bottom:50px;

            color:#2c3e50;

        }

        .botones{

            display:flex;

            gap:40px;

            justify-content:center;

        }

        .btn{

            text-decoration:none;

            background:#3498db;

            color:white;

            padding:25px 45px;

            border-radius:15px;

            font-size:24px;

            font-weight:bold;

            transition:0.3s;

            box-shadow:0 6px 15px rgba(0,0,0,0.15);

        }

        .btn:hover{

            transform:translateY(-8px);

            background:#2980b9;

        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>🍽 Cocina Inteligente</h1>

    <div class="botones">

        <a href="/menu/" class="btn">

            📊 Consultas

        </a>

        <a href="/platillos/" class="btn">

            🍔 Menú de Platillos

        </a>

    </div>

</div>

</body>
</html>
